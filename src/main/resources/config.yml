event-world: ""
players-per-team: 10
team-a-display-name: Yellow Team
team-b-display-name: Red Team
max-faction-queue-players: 100
queue-countdown-seconds: 60
vote-duration-seconds: 30

fixed-match-settings:
  enabled: true
  base: medium
  kit: predefined

world-restore:
  blocks-per-tick: 2048
  chunks-per-tick: 1
  scan-columns-per-tick: 32

base-separation-blocks: 200
spawn-y: 255
# Fallback Y when no safe standing spot is found at the team spawn column.
paste-anchor-x: 0
paste-anchor-z: 0
# Deprecated for schematics; paste normalization places lowest solid row at world Y=0
paste-y: 0

world-border-padding-blocks: 500

# Local schematic offsets from paste origin min corner (dx, dy, dz) — anchor chunk is always claimed
schematic-center-from-min:
  easy: "8, 0, 8"
  medium: "8, 0, 8"
  hard: "8, 0, 8"

predefined-kit:
  # Fallback kit when no kit has been saved with /raidriot admin kit set
  helmet: IRON_HELMET
  chestplate: IRON_CHESTPLATE
  leggings: IRON_LEGGINGS
  boots: IRON_BOOTS
  items:
    - TNT:64
    - SAND:64
    - REDSTONE:64
    - WATER_BUCKET:1
    - LAVA_BUCKET:1

match-duration-seconds: 1500
countdown-seconds: 10
respawn-delay-seconds: 10
depth-sample-interval-ticks: 20

breach-materials:
  - OBSIDIAN

draw-on-equal-depth: true
lock-notify-cooldown-ms: 2000

worldedit-paste-offset:
  add-worldedit-offset: true
  extra-x: 0
  extra-y: 0
  extra-z: 0

factions:
  base-claim-method: isBaseClaim
  source-world:
    - world
  # Memberless system factions auto-created on enable; if the tag exists, Yellow0/Yellow1… or Red0/Red1… is used
  event-faction-a-tag: Yellow
  event-faction-b-tag: Red
  # Max claim power = base chunk count + this buffer (e.g. 25 base chunks → 325 power)
  event-faction-power-buffer: 300

messages:
  prefix: "&c&lRaid Riot &8» &r&7"

  queue:
    joined: "{prefix}&7You joined the queue! &7({count}/{max})"
    full: "{prefix}&cThe queue is full."
    team-full: "{prefix}&cThat team is full."
    need-faction: "{prefix}&cYou must be in a faction to join this event."
    faction-full: "{prefix}&cYour faction team is already full."
    faction-not-qualified: "{prefix}&cYour faction is not eligible for this event."
    not-qualified: "{prefix}&cYou did not qualify for this event."
    cancelled: "{prefix}&cEvent cancelled: &7{reason}"
    locked: "{prefix}&7Queue locked! Preparing the arena..."
    countdown: "{prefix}&7The queue closes in &f{seconds} &7seconds..."
    cancel-factions-not-ready: "{prefix}&cTwo factions did not reach the required size."
    cancel-not-enough-players: "{prefix}&cNot enough players joined ({count}/{max})."
    already-open: "{prefix}&cQueue already open."
    event-world-not-configured: "{prefix}&cEvent world not configured. Use /raidriot admin setup world <world>"
    event-world-not-loaded: "{prefix}&cEvent world not loaded: {world}"

  vote:
    winner: "{prefix}&7Selected base: &e{base}&7 | Kit: &e{kit}&7. Preparing arena..."

  match:
    countdown: "{prefix}&7The event is starting in &f{seconds} &7seconds..."
    waiting-for-arena: "{prefix}&eWaiting for base generation..."
    started: "{prefix}&7Raid Riot has begun! &7{teamA} &fvs &7{teamB}"
    ended-breach: "{prefix}&7{winner} &7breached &c{loser}&7 in &e{time}&7!"
    ended-depth: "{prefix}&7{winner} &7won with depth &e{depth}&7 vs &c{otherDepth}&7!"
    ended-draw: "{prefix}&eDraw! &7Both teams reached depth &e{depth}&7."
    ended-admin: "{prefix}&cMatch stopped: &7{reason}"
    timer-warning: "{prefix}&c{minutes}:{seconds} &7remaining!"
    terrain-restoring: "{prefix}&cPrevious event terrain is still restoring."
    already-active: "{prefix}&cA Raid Riot session is already active."
    default-stop-reason: "{prefix}&7Stopped by admin."

  join:
    no-match: "{prefix}&cNo Raid Riot queue is open right now."
    already-in: "{prefix}&cYou are already in the queue."

  portal:
    not-open: "{prefix}&cThe Raid Riot queue is not open."

  leave:
    success: "{prefix}&7You left the queue."
    spectator-success: "{prefix}&7You stopped spectating."
    not-in: "{prefix}&cYou are not in the queue."

  status:
    none: "{prefix}&7No active Raid Riot session."
    queue: "{prefix}&7Queue: &e{count}/{max} &8| &e{time}s &8| &7{phase}"
    voting: "{prefix}&7Voting open &8| &e{time}s remaining"
    active: "{prefix}&7{teamA} &fvs &7{teamB} &8| &e{time} &8| Depth: &7{depthA} &7/ &c{depthB}"

  death:
    title: "&c&lYOU DIED"
    subtitle: ""
    respawn-wait: "{prefix}&7Respawning in &c{seconds}&7 seconds..."
    broadcast: "{prefix}&7{victim} &7({team}) was eliminated by &c{killer}&7!"
    broadcast-no-killer: "{prefix}&7{victim} &7({team}) was eliminated!"

  spectator:
    entered: "{prefix}&7You are now spectating the match."
    left: "{prefix}&7You stopped spectating."
    teleported: "{prefix}&7Teleported to &f{target}&7."
    no-target: "{prefix}&cThat player is not available."

  patch:
    must-be-naked: "{prefix}&cYou must be naked to patch on your base/cannon."

  raid:
    locked-block-change: "{prefix}&cYou cannot modify blocks here during the event."

  faction:
    claim-success: "{prefix}&7Claimed this chunk for your team."
    claim-failed: "{prefix}&cCould not claim this chunk."

  admin:
    world-set: "{prefix}&7Event world set to &e{world}&7."
    reload: "{prefix}&7Reloaded config."
    kit-set: "{prefix}&7Saved your inventory and armor as the event kit."
    kit-players-only: "{prefix}&cOnly players can set the event kit."
    queue-opened: "{prefix}&7Raid Riot queue opened ({mode})."
    session-stopped: "{prefix}&7Raid Riot session stopped."
    base-list-header: "{prefix}&6Base schematics:"
    base-list-entry: "{prefix}&e{option}&7: &f{file}"
    base-list-not-set: "(not set)"
    base-set: "{prefix}&7Set &e{option} &7to &f{file}&7."
    base-cleared: "{prefix}&7Cleared &e{option}&7."
    kit-save-failed: "{prefix}&cCould not save kit: {error}"
    default-queue-stop-reason: "{prefix}&7Queue cancelled by admin."
    queue-stopped: "{prefix}&7Queue cancelled."
    no-queue-to-stop: "{prefix}&cNo queue is open to cancel."
    no-session-to-stop: "{prefix}&cNo active Raid Riot session to stop."
    world-not-set: "(not set)"
    status-idle: "Idle"
    status-idle-detail: "No session running."
    status-queue: "Queue open"
    status-queue-detail: "{count}/{max} players, {time}s remaining"
    status-match-detail: "{teamA} vs {teamB}"

  command:
    players-only: "{prefix}&cPlayers only."
    no-permission: "{prefix}&cNo permission."
    usage-setup-world: "{prefix}&cUsage: /raidriot admin setup world <world>"
    world-not-loaded: "{prefix}&cWorld not loaded: {world}"
    usage-start: "{prefix}&cUsage: /raidriot admin start random|faction"
    invalid-mode: "{prefix}&cMode must be random or faction."
    usage-base: "{prefix}&cUsage: /raidriot admin base list|set|clear ..."
    usage-base-full: "{prefix}&cUsage: /raidriot admin base list|set <easy|medium|hard> <file>|clear <easy|medium|hard>"
    usage-kit-set: "{prefix}&cUsage: /raidriot admin kit set"
    help-header: "{prefix}&6Raid Riot:"
    help-join: "{prefix}&e/raidriot &7- Open queue/vote GUI"
    help-leave: "{prefix}&e/raidriot leave"
    help-queue-leave: "{prefix}&e/raidriot queue leave"
    help-status: "{prefix}&e/raidriot status"
    usage-queue-leave: "{prefix}&cUsage: /raidriot queue leave"
    admin-help-header: "{prefix}&6Admin:"
    admin-help-setup: "{prefix}&e/raidriot admin setup world <world>"
    admin-help-start: "{prefix}&e/raidriot admin start random|faction"
    admin-help-stop: "{prefix}&e/raidriot admin stop [a|b|draw|none] [reason]"
    admin-help-stopqueue: "{prefix}&e/raidriot admin stopqueue [reason]"
    admin-help-gui: "{prefix}&e/raidriot admin &7- Open admin GUI"
    admin-help-base: "{prefix}&e/raidriot admin base list|set|clear ..."
    admin-help-reload: "{prefix}&e/raidriot admin reload"

  centered:
    header: "&c&lRAID RIOT"
    queue-open-line1: "&7The queue for the &cRaid Riot Event &7has opened!"
    queue-open-faction: "&7Run &c/raidriot &7to join the queue! The queue will close in &c{seconds} &7seconds."
    queue-open-random-line1: "&7Run &c/raidriot &7to join! Teams are assigned randomly"
    queue-open-random-line2: "&7when the event starts. The queue will close in &c{seconds} &7seconds."
    queue-open-footer: "&7Be the first team to breach the other base!"
    event-started-line1: "&7The event has started! Run &c/raidriot"
    event-started-line2: "&7to spectate the event!"
    event-ended-line1: "&fThe &cRaid Riot &fevent has ended!"
    event-ended-winner: "&fWinner: &6{winner}"
    event-ended-draw: "&fWinner: &eDraw"
    event-ended-time: "&fTime: &c{time}"
    winner-name-separator: "&7, "
    winner-name-entry: "&6{name}"
    duration-one-second: "1 second"
    duration-seconds: "{seconds} seconds"

  errors:
    no-schematic: "{prefix}&cNo schematic configured for {option}."
    schematic-not-found: "{prefix}&cSchematic not found: {path}"
    no-baseclaims: "{prefix}&cNo baseclaims for faction {faction} in world {world}."
    factions-source-not-loaded: "{prefix}&cFactions source world not loaded: {world}"
    factions-claim-unavailable: "{prefix}&cFactions claim API unavailable."
    unexpected-claims-type: "{prefix}&cUnexpected claims type from Factions Board."
    no-claims-for-faction: "{prefix}&cNo claims found for faction {faction}."
    faction-tag-unavailable: "{prefix}&cCould not find an available faction tag for base name '{base}'."

